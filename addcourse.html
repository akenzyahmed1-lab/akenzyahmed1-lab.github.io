    <h2>Add New Course</h2>
    <form action="" method="post">
        <div>
            <div>
                <label>Course Name:</label>
                <input type="text" placeholder="Enter course name" required><br>
            </div>
            <br>
            
            <div>
                <label>Instructor:</label>
                <input type="text" placeholder="Instructor name" required><br>
            </div>
            <br>
            <div>
                <label>Credit Hours:</label>
                <input type="number" ><br>
            </div>
            <br>
            <div>
                <label>Notes:</label>
                <textarea name="subject" rows="10" cols="30" placeholder="Notes" maxlength="200"></textarea><br>
            </div>
            <br>
            <button type="submit">submit</button>
            <button type="reset">reset</button>
        </div>
    </form>
</main>
